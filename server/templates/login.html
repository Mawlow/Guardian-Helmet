<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#001524">
  <title>Log in – Guardian Helmet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #001524;
      --bg-elevated: #021c2e;
      --border: #0d2d42;
      --accent: #8E1616;
      --accent-hover: #a91d1d;
      --text: #f0f4f8;
      --text-muted: #8a9bab;
      --error: #f85149;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      display: block;
      filter: brightness(0) saturate(100%) invert(18%) sepia(89%) saturate(5000%) hue-rotate(350deg) brightness(0.6);
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-decoration: none;
      margin-top: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .msg-error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="/images/helmet.png" alt="" class="login-logo" />
    <h1>Guardian Helmet</h1>
    <p class="login-sub">{% if register %}Create first account{% else %}Log in to continue{% endif %}</p>

    {% if error %}
    <div class="msg-error">{{ error }}</div>
    {% endif %}

    {% if register %}
    <form method="post" action="{{ url_for('register_page') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="Username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Password" />
      </div>
      <div class="form-group">
        <label for="email">Email (optional)</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="Email" />
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>
    <p class="login-footer" style="margin-top: 16px;"><a href="{{ url_for('login_page') }}">Back to log in</a></p>
    {% else %}
    <form method="post" action="{{ url_for('login_page') }}">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}" />
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="Username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Password" />
      </div>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    {% endif %}

    {% if not register and not has_users %}
    <p class="login-footer"><a href="{{ url_for('register_page') }}">Create first account</a></p>
    {% endif %}
  </div>
</body>
</html>
